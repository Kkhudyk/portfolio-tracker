<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <!-- ── LOGIN ── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">₿</div>
      <h1>Portfolio</h1>
      <p>Sign in to view your dashboard</p>
      <form id="login-form">
        <div class="input-group">
          <span class="icon">🔑</span>
          <input
            id="password-input"
            type="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          />
        </div>
        <button class="btn-primary" type="submit">Sign in</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <!-- ── APP ── -->
  <div id="app">
    <header>
      <div class="header-brand">
        <div class="brand-dot"></div>
        Portfolio
      </div>
      <div class="header-actions">
        <span class="last-updated" id="last-updated"></span>
        <button class="btn-icon btn-refresh" id="btn-refresh">↻ Refresh</button>
        <button class="btn-icon btn-logout" id="btn-logout">Sign out</button>
      </div>
    </header>

    <!-- Tab navigation -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
      <button class="tab-btn" data-tab="staking">💎 Staking Investment</button>
    </div>

    <main>
      <div id="dashboard-content"></div>
      <div id="staking-content" style="display:none"></div>
    </main>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
